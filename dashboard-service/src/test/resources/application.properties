spring.cloud.config.enabled=false
spring.config.import=optional:configserver:
spring.cloud.discovery.enabled=false
eureka.client.enabled=false

kafka.bootstrap-servers=localhost:9092
dashboard.service.event-topic=ride.request.events
dashboard.service.ack-topic=ride.request.events.acks
dashboard.service.consumer-group-id=dashboard-service.group
dashboard.service.listener-id=dashboardServiceListener

spring.datasource.url=jdbc:h2:mem:dashboardservicedb;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
