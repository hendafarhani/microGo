name: Build And Push Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: registry.digitalocean.com
  REGISTRY_REPOSITORY: hendafarhani-microgo-registry

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - centralized-config
          - discovery
          - gateway
          - ride-request
          - location-rider
          - location-saver

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build application jar
        working-directory: ${{ matrix.service }}
        run: mvn -B clean package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DigitalOcean Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCR_USERNAME }}
          password: ${{ secrets.DOCR_TOKEN }}

      - name: Build and push image
        id: build_image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ env.REGISTRY }}/${{ env.REGISTRY_REPOSITORY }}/microgo-${{ matrix.service }}:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.repository }}
          provenance: false
          sbom: false

      - name: Save image digest map
        run: |
          mkdir -p digest-map
          cat > digest-map/${{ matrix.service }}.txt <<EOF
          service=${{ matrix.service }}
          image=${{ env.REGISTRY }}/${{ env.REGISTRY_REPOSITORY }}/microgo-${{ matrix.service }}:latest
          digest=${{ steps.build_image.outputs.digest }}
          git_sha=${{ github.sha }}
          run_id=${{ github.run_id }}
          EOF

      - name: Upload digest map artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-map-${{ matrix.service }}
          path: digest-map/${{ matrix.service }}.txt
