fullnameOverride: location-saver

namespace:
  name: microgo-dev

global:
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []

component:
  name: location-saver
  fullnameOverride: location-saver
  replicaCount: 1
  containerPort: 8084
  image:
    repository: registry.digitalocean.com/hendafarhani-microgo-registry/microgo-location-saver
    tag: latest
  service:
    enabled: true
    type: ClusterIP
    port: 8084
    targetPort: 8084
  configMap:
    enabled: true
    data:
      SPRING_CLOUD_CONFIG_URI: http://centralized-config:8080
      SPRING_CLOUD_CONFIG_NAME: location-saver
      SPRING_CONFIG_IMPORT: optional:configserver:http://centralized-config:8080
  secret:
    enabled: false
    stringData: {}
  env:
    - name: SERVER_PORT
      value: "8084"
    - name: PORT
      value: "8084"
  readinessProbe:
    tcpSocket:
      port: 8084
    initialDelaySeconds: 20
    periodSeconds: 10
  livenessProbe:
    tcpSocket:
      port: 8084
    initialDelaySeconds: 40
    periodSeconds: 15
  resources: {}
