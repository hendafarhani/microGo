fullnameOverride: gateway

namespace:
  name: microgo-dev

global:
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []

component:
  name: gateway
  fullnameOverride: gateway
  replicaCount: 1
  containerPort: 8010
  image:
    repository: registry.digitalocean.com/hendafarhani-microgo-registry/microgo-gateway
    tag: latest
  service:
    enabled: true
    type: LoadBalancer
    port: 8010
    targetPort: 8010
  env:
    - name: SERVER_PORT
      value: "8010"
    - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
      value: http://discovery:8082/eureka
    - name: EUREKA_INSTANCE_PREFER_IP_ADDRESS
      value: "true"
  readinessProbe:
    tcpSocket:
      port: 8010
    initialDelaySeconds: 20
    periodSeconds: 10
  livenessProbe:
    tcpSocket:
      port: 8010
    initialDelaySeconds: 40
    periodSeconds: 15
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: microgo.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []
  resources: {}
