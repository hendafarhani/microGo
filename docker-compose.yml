networks:
  app-network:
    driver: bridge

services:

  kafka:
    image: bitnami/kafka:latest
    container_name: kafka
    networks:
      - app-network
    ports:
      - "9092:9092"
    environment:
      KAFKA_KRAFT_CLUSTER_ID: kraft-cluster-1
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      ALLOW_PLAINTEXT_LISTENER: yes
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER

  redis:
    image: redis:latest
    networks:
      - app-network
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    networks:
      - app-network
    ports:
      - "5672:5672"
      - "15672:15672"

  mysql:
    image: mysql:8
    networks:
      - app-network
    environment:
      MYSQL_DATABASE: ride_sharing
      MYSQL_ROOT_PASSWORD: password
      MYSQL_ROOT_HOST: '%'
      MYSQL_USER: microgo_user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    healthcheck:
      test: [ "CMD", "microgo_user", "ping", "-h", "localhost" ]
      interval: 5s
      retries: 5
    volumes:
      - ./mysql-init:/docker-entrypoint-initdb.d

  centralized-config:
    build: ./centralized-config
    restart:
      always
    depends_on:
      - rabbitmq
    networks:
      - app-network
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: native

  discovery:
    build: ./discovery
    networks:
      - app-network
    depends_on:
      - centralized-config
    ports:
      - "8082:8082"

  gateway:
    build: ./gateway
    networks:
      - app-network
    ports:
      - "8010:8010"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8082/eureka
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: true

  ride-request:
    build: ./ride-request
    depends_on:
      - discovery
      - centralized-config
      - rabbitmq
      - redis
      - mysql
    networks:
      - app-network
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://centralized-config:8080
    restart:
      always

  location-rider:
    build: ./location-rider
    depends_on:
      - discovery
      - centralized-config
      - kafka
      - mysql
    networks:
      - app-network
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://centralized-config:8080
    restart:
      always

  location-saver:
    build: ./location-saver
    networks:
      - app-network
    depends_on:
      - discovery
      - kafka
      - redis
      - centralized-config
      - rabbitmq
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://centralized-config:8080
    restart:
      always


