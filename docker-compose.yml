networks:
  app-network:
    driver: bridge

services:

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    networks:
      - app-network
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

  redis:
    image: redis:latest
    networks:
      - app-network
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    networks:
      - app-network
    ports:
      - "5672:5672"
      - "15672:15672"

  mysql:
    image: mysql:8
    networks:
      - app-network
    environment:
      MYSQL_DATABASE: ride_requests_db
      MYSQL_ROOT_PASSWORD: password
      MYSQL_ROOT_HOST: '%'
      MYSQL_USER: microgo_user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -ppassword"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./mysql-init:/docker-entrypoint-initdb.d

  centralized-config:
    build: ./centralized-config
    restart:
      always
    depends_on:
      rabbitmq:
        condition: service_started
    networks:
      - app-network
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: native
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ride-request/default >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12

  discovery:
    build: ./discovery
    depends_on:
      centralized-config:
        condition: service_healthy
    networks:
      - app-network
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082 >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12

  gateway:
    build: ./gateway
    networks:
      - app-network
    depends_on:
      discovery:
        condition: service_healthy
    ports:
      - "8010:8010"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8082/eureka
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: true

  ride-request:
    build: ./ride-request
    depends_on:
      discovery:
        condition: service_healthy
      centralized-config:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      redis:
        condition: service_started
      mysql:
        condition: service_healthy
    networks:
      - app-network
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://centralized-config:8080
    restart:
      always

  location-rider:
    build: ./location-rider
    depends_on:
      discovery:
        condition: service_healthy
      centralized-config:
        condition: service_healthy
      kafka:
        condition: service_started
      mysql:
        condition: service_healthy
    networks:
      - app-network
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://centralized-config:8080
    restart:
      always

  location-saver:
    build: ./location-saver
    networks:
      - app-network
    depends_on:
      discovery:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_started
      centralized-config:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://centralized-config:8080
    restart:
      always
