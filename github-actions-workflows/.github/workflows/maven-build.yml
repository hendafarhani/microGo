name: Reusable Maven Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  workflow_call:
    inputs:
      java_version:
        required: true
        type: string
      maven_goal:
        required: false
        type: string
        default: verify

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java_version }}
          cache: maven

      - name: Maven build
        run: mvn -B ${{ inputs.maven_goal }}
